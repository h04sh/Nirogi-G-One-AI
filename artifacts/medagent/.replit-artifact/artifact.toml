kind = "web"
previewPath = "/"
title = "Nirogi G-One AI - Healthcare"
version = "1.0.0"
id = "artifacts/medagent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20860

[services.development]
run = "pnpm --filter @workspace/nirogi-g-one-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nirogi-g-one-ai", "run", "build" ]
publicDir = "artifacts/medagent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20860"
BASE_PATH = "/"
