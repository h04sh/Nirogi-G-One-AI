services:
  postgres:
    image: postgres:16-alpine
    container_name: nirogi-g-one-ai-db
    environment:
      POSTGRES_USER: nirogi
      POSTGRES_PASSWORD: nirogi
      POSTGRES_DB: nirogi
    ports:
      - "5432:5432"
    volumes:
      - nirogi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nirogi -d nirogi"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  nirogi_pgdata:
