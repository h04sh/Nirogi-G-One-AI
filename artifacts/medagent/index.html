<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Nirogi G-One AI — Healthcare</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              card: "hsl(var(--card))",
              "card-foreground": "hsl(var(--card-foreground))",
              primary: "hsl(var(--primary))",
              "primary-foreground": "hsl(var(--primary-foreground))",
              secondary: "hsl(var(--secondary))",
              "secondary-foreground": "hsl(var(--secondary-foreground))",
              muted: "hsl(var(--muted))",
              "muted-foreground": "hsl(var(--muted-foreground))",
              accent: "hsl(var(--accent))",
              "accent-foreground": "hsl(var(--accent-foreground))",
              destructive: "hsl(var(--destructive))",
              "destructive-foreground": "hsl(var(--destructive-foreground))",
            },
            fontFamily: {
              sans: "var(--app-font-sans)",
              serif: "var(--app-font-serif)",
              mono: "var(--app-font-mono)",
            },
            borderRadius: {
              lg: "var(--radius)",
            },
          },
        },
      }
    </script>
    <style>
      :root {
        --background: 138 30% 97%;
        --foreground: 158 45% 14%;
        --border: 140 20% 85%;
        --input: 140 20% 88%;
        --ring: 158 42% 30%;
        --card: 0 0% 100%;
        --card-foreground: 158 45% 14%;
        --card-border: 140 20% 87%;
        --popover: 0 0% 100%;
        --popover-foreground: 158 45% 14%;
        --popover-border: 140 20% 87%;
        --primary: 158 42% 28%;
        --primary-foreground: 0 0% 100%;
        --secondary: 138 30% 93%;
        --secondary-foreground: 158 38% 28%;
        --muted: 138 25% 92%;
        --muted-foreground: 158 25% 42%;
        --accent: 138 28% 90%;
        --accent-foreground: 158 45% 14%;
        --destructive: 0 60% 52%;
        --destructive-foreground: 0 0% 100%;
        --app-font-sans: 'Inter', sans-serif;
        --app-font-serif: Georgia, serif;
        --app-font-mono: Menlo, monospace;
        --radius: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
